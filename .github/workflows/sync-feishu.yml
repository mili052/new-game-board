name: Sync Feishu Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync from Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_VIEW_ID: ${{ secrets.FEISHU_VIEW_ID }}
          FEISHU_PUBLISH_VALUE: ${{ secrets.FEISHU_PUBLISH_VALUE }}
          FEISHU_SITE_TITLE: 新游产品库
        run: node scripts/sync-feishu.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/boards.json public/feishu-assets
          git commit -m "Sync Feishu data"
          git pull --rebase --autostash origin main
          git push

  build:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp -r public/* dist/
          mkdir -p dist/data
          cp data/boards.json dist/data/boards.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
